<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>微信控件树可视化查看器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1e1e1e;
            color: #d4d4d4;
            height: 100vh;
            overflow: hidden;
        }

        .header {
            background: #2d2d30;
            padding: 10px 20px;
            border-bottom: 1px solid #3c3c3c;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 16px;
            color: #ffffff;
        }

        .load-btn {
            padding: 6px 16px;
            background: #0e639c;
            color: white;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            font-size: 13px;
        }

        .load-btn:hover {
            background: #1177bb;
        }

        .container {
            display: flex;
            height: calc(100vh - 50px);
        }

        .sidebar {
            width: 525px;
            background: #252526;
            border-right: 1px solid #3c3c3c;
            display: flex;
            flex-direction: column;
            min-width: 400px;
        }

        .search-box {
            padding: 10px;
            border-bottom: 1px solid #3c3c3c;
        }

        .search-input {
            width: 100%;
            padding: 6px 10px;
            background: #3c3c3c;
            border: 1px solid #555;
            border-radius: 3px;
            color: #d4d4d4;
            font-size: 13px;
        }

        .search-input:focus {
            outline: none;
            border-color: #0e639c;
        }

        .tree-container {
            flex: 1;
            overflow: auto;
            padding: 10px;
        }

        .tree-node {
            margin-left: 20px;
            min-width: fit-content;
        }

        .tree-node-content {
            padding: 3px 6px;
            cursor: pointer;
            border-radius: 3px;
            font-size: 11px;
            line-height: 1.4;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .tree-node-content:hover {
            background: #2a2d2e;
        }

        .tree-node-content.selected {
            background: #094771;
        }

        .tree-toggle {
            display: inline-block;
            width: 16px;
            cursor: pointer;
            user-select: none;
        }

        .tree-toggle.leaf {
            visibility: hidden;
        }

        .control-type {
            color: #4ec9b0;
            font-weight: bold;
        }

        .control-name {
            color: #ce9178;
            display: inline-block;
            max-width: 150px;
            overflow: hidden;
            text-overflow: ellipsis;
            vertical-align: bottom;
        }

        .control-id {
            color: #9cdcfe;
            font-size: 11px;
            margin-left: 5px;
        }

        .main-content {
            flex: 1;
            position: relative;
            overflow: auto;
            background: #1e1e1e;
        }

        .visual-container {
            position: relative;
            background: #2d2d30;
            margin: 20px;
            border: 2px solid #3c3c3c;
            border-radius: 4px;
        }

        .control-block {
            position: absolute;
            border: 2px solid;
            cursor: pointer;
            transition: all 0.15s;
            overflow: visible;
            font-size: 10px;
            display: flex;
            align-items: flex-start;
            justify-content: flex-start;
            padding: 2px;
            pointer-events: auto;
        }

        .control-block:hover {
            filter: brightness(1.5);
            z-index: 10000 !important;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.8);
            border-width: 3px;
        }

        .control-block.selected {
            filter: brightness(1.8);
            box-shadow: 0 0 0 3px #007acc, 0 0 20px rgba(0, 122, 204, 0.8);
            border-width: 3px;
            border-color: #007acc !important;
        }

        .control-block .label {
            background: rgba(0, 0, 0, 0.85);
            color: #fff;
            padding: 1px 4px;
            border-radius: 2px;
            font-size: 9px;
            max-width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            pointer-events: none;
            font-weight: 500;
        }

        /* 不同控件类型的颜色 */
        .type-WindowControl { border-color: #ff6b6b; background: rgba(255, 107, 107, 0.1); }
        .type-ButtonControl { border-color: #4ecdc4; background: rgba(78, 205, 196, 0.15); }
        .type-ListControl { border-color: #45b7d1; background: rgba(69, 183, 209, 0.15); }
        .type-EditControl { border-color: #f9ca24; background: rgba(249, 202, 36, 0.15); }
        .type-TextControl { border-color: #6c5ce7; background: rgba(108, 92, 231, 0.15); }
        .type-GroupControl { border-color: #a29bfe; background: rgba(162, 155, 254, 0.1); }
        .type-CustomControl { border-color: #fd79a8; background: rgba(253, 121, 168, 0.1); }
        .type-ToolBarControl { border-color: #00b894; background: rgba(0, 184, 148, 0.15); }
        .type-DocumentControl { border-color: #e17055; background: rgba(225, 112, 85, 0.15); }
        .type-ScrollBarControl { border-color: #636e72; background: rgba(99, 110, 114, 0.15); }
        .type-ThumbControl { border-color: #b2bec3; background: rgba(178, 190, 195, 0.15); }
        .type-ImageControl { border-color: #fdcb6e; background: rgba(253, 203, 110, 0.15); }

        .detail-panel {
            position: fixed;
            right: 0;
            top: 50px;
            width: 300px;
            bottom: 0;
            background: #252526;
            border-left: 1px solid #3c3c3c;
            overflow-y: auto;
            padding: 15px;
            display: none;
        }

        .detail-panel.show {
            display: block;
        }

        .detail-header {
            font-size: 16px;
            color: #ffffff;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #0e639c;
        }

        .detail-section {
            margin-bottom: 15px;
        }

        .detail-section h3 {
            font-size: 12px;
            color: #4ec9b0;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .detail-item {
            display: flex;
            padding: 5px 0;
            border-bottom: 1px solid #3c3c3c;
            font-size: 12px;
        }

        .detail-label {
            width: 100px;
            color: #9cdcfe;
        }

        .detail-value {
            flex: 1;
            color: #d4d4d4;
            word-break: break-all;
        }

        .stats-bar {
            position: fixed;
            bottom: 0;
            left: 525px;
            right: 0;
            background: #2d2d30;
            padding: 8px 20px;
            border-top: 1px solid #3c3c3c;
            display: flex;
            gap: 20px;
            font-size: 12px;
            z-index: 100;
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .stat-label {
            color: #9cdcfe;
        }

        .stat-value {
            color: #4ec9b0;
            font-weight: bold;
        }

        .empty-state {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #6c6c6c;
            font-size: 16px;
            text-align: center;
        }

        .legend {
            position: fixed;
            bottom: 40px;
            left: 545px;
            background: rgba(45, 45, 48, 0.95);
            padding: 10px;
            border-radius: 4px;
            border: 1px solid #3c3c3c;
            font-size: 11px;
            z-index: 50;
        }

        .legend-item {
            display: flex;
            align-items: center;
            margin: 3px 0;
            gap: 8px;
        }

        .legend-color {
            width: 20px;
            height: 12px;
            border: 1px solid;
        }

        ::-webkit-scrollbar {
            width: 10px;
            height: 10px;
        }

        ::-webkit-scrollbar-track {
            background: #1e1e1e;
        }

        ::-webkit-scrollbar-thumb {
            background: #424242;
            border-radius: 5px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #4e4e4e;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🔍 微信控件树可视化查看器</h1>
        <input type="file" id="fileInput" accept=".json" style="display: none;">
        <button class="load-btn" onclick="document.getElementById('fileInput').click()">
            📂 加载 JSON 文件
        </button>
    </div>

    <div class="container">
        <div class="sidebar">
            <div class="search-box">
                <input type="text" class="search-input" id="searchInput" placeholder="搜索控件名称..." oninput="searchTree()">
            </div>
            <div class="tree-container" id="treeContainer">
                <div class="empty-state">
                    请加载 JSON 文件开始查看
                </div>
            </div>
        </div>

        <div class="main-content" id="mainContent">
            <div class="empty-state" id="visualEmpty">
                加载文件后将显示可视化布局
            </div>
            <div class="visual-container" id="visualContainer" style="display: none;"></div>
        </div>
    </div>

    <div class="detail-panel" id="detailPanel"></div>

    <div class="stats-bar" id="statsBar">
        <div class="stat-item">
            <span class="stat-label">总控件数:</span>
            <span class="stat-value" id="totalControls">0</span>
        </div>
        <div class="stat-item">
            <span class="stat-label">按钮:</span>
            <span class="stat-value" id="buttonCount">0</span>
        </div>
        <div class="stat-item">
            <span class="stat-label">列表:</span>
            <span class="stat-value" id="listCount">0</span>
        </div>
        <div class="stat-item">
            <span class="stat-label">聊天:</span>
            <span class="stat-value" id="chatCount">0</span>
        </div>
    </div>

    <div class="legend" id="legend">
        <div style="font-weight: bold; margin-bottom: 5px;">控件类型图例：</div>
        <div class="legend-item"><div class="legend-color" style="border-color: #ff6b6b; background: rgba(255, 107, 107, 0.3);"></div> Window</div>
        <div class="legend-item"><div class="legend-color" style="border-color: #4ecdc4; background: rgba(78, 205, 196, 0.3);"></div> Button</div>
        <div class="legend-item"><div class="legend-color" style="border-color: #45b7d1; background: rgba(69, 183, 209, 0.3);"></div> List</div>
        <div class="legend-item"><div class="legend-color" style="border-color: #f9ca24; background: rgba(249, 202, 36, 0.3);"></div> Edit</div>
        <div class="legend-item"><div class="legend-color" style="border-color: #6c5ce7; background: rgba(108, 92, 231, 0.3);"></div> Text</div>
        <div class="legend-item"><div class="legend-color" style="border-color: #a29bfe; background: rgba(162, 155, 254, 0.3);"></div> Group</div>
    </div>

    <script>
        let jsonData = null;
        let treeData = [];
        let selectedNode = null;
        let windowOffset = { x: 0, y: 0 };

        document.getElementById('fileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    jsonData = JSON.parse(e.target.result);
                    windowOffset = {
                        x: jsonData.window_info.rectangle.x,
                        y: jsonData.window_info.rectangle.y
                    };
                    buildTree();
                    renderVisualization();
                    updateStats();
                } catch (err) {
                    alert('JSON 文件解析失败: ' + err.message);
                }
            };
            reader.readAsText(file);
        });

        function buildTree() {
            const container = document.getElementById('treeContainer');
            container.innerHTML = '';

            if (!jsonData || !jsonData.control_tree) return;

            treeData = jsonData.control_tree;
            const root = treeData[0];
            
            const treeHtml = buildTreeNode(root, 0);
            container.innerHTML = treeHtml;
            
            // 为所有树节点添加点击事件
            container.querySelectorAll('.tree-node-content').forEach(element => {
                element.addEventListener('click', function(e) {
                    // 如果点击的是展开/折叠按钮，不触发选择
                    if (e.target.classList.contains('tree-toggle')) {
                        return;
                    }
                    const index = parseInt(this.dataset.index);
                    selectNode(index);
                });
            });
        }

        function buildTreeNode(node, index) {
            const children = getChildren(index);
            const hasChildren = children.length > 0;
            
            let html = '<div class="tree-node">';
            html += '<div class="tree-node-content" data-index="' + index + '" title="' + escapeHtml(node.name || '') + '">';
            
            html += '<span class="tree-toggle ' + (hasChildren ? '' : 'leaf') + '" onclick="event.stopPropagation(); toggleNode(event, this)">';
            html += hasChildren ? '▼' : '•';
            html += '</span> ';
            
            html += '<span class="control-type">[' + escapeHtml(node.control_type.replace('Control', '')) + ']</span> ';
            
            const name = node.name || '(无名称)';
            const displayName = name.length > 25 ? name.substring(0, 25) + '...' : name;
            html += '<span class="control-name">' + escapeHtml(displayName) + '</span>';
            
            if (node.automation_id) {
                html += '<span class="control-id">' + escapeHtml(node.automation_id) + '</span>';
            }
            
            html += '</div>';
            
            if (hasChildren) {
                html += '<div class="tree-node-children">';
                children.forEach(childIndex => {
                    html += buildTreeNode(treeData[childIndex], childIndex);
                });
                html += '</div>';
            }
            
            html += '</div>';
            return html;
        }

        function getChildren(parentIndex) {
            const parentDepth = treeData[parentIndex].depth;
            const children = [];
            
            for (let i = parentIndex + 1; i < treeData.length; i++) {
                if (treeData[i].depth === parentDepth + 1) {
                    children.push(i);
                } else if (treeData[i].depth <= parentDepth) {
                    break;
                }
            }
            
            return children;
        }

        function renderVisualization() {
            const container = document.getElementById('visualContainer');
            const emptyState = document.getElementById('visualEmpty');
            
            if (!jsonData || !jsonData.control_tree) return;
            
            emptyState.style.display = 'none';
            container.style.display = 'block';
            
            const windowRect = jsonData.window_info.rectangle;
            container.style.width = windowRect.width + 'px';
            container.style.height = windowRect.height + 'px';
            
            container.innerHTML = '';
            
            console.log('Window rectangle:', windowRect);
            console.log('Window offset:', windowOffset);
            
            treeData.forEach((node, index) => {
                if (!node.position || node.position.width === 0 || node.position.height === 0) return;
                
                const block = document.createElement('div');
                block.className = 'control-block type-' + node.control_type;
                block.dataset.index = index;
                
                // 计算相对于窗口左上角的坐标
                const x = node.position.x - windowRect.left;
                const y = node.position.y - windowRect.top;
                
                console.log('Control:', node.name, 'Absolute:', node.position.x, node.position.y, 'Relative:', x, y);
                
                block.style.left = x + 'px';
                block.style.top = y + 'px';
                block.style.width = node.position.width + 'px';
                block.style.height = node.position.height + 'px';
                // 深度越深，层级越高，确保内层控件可以被点击
                block.style.zIndex = 1000 + node.depth;
                
                if (node.name && node.name !== '(无名称)' && node.position.width > 30 && node.position.height > 15) {
                    const label = document.createElement('div');
                    label.className = 'label';
                    label.textContent = node.name.substring(0, 20);
                    label.style.pointerEvents = 'none';
                    block.appendChild(label);
                }
                
                // 添加点击事件，阻止冒泡
                block.onclick = function(e) {
                    e.stopPropagation();
                    selectNode(index);
                };
                
                container.appendChild(block);
            });
        }

        function selectNode(index) {
            console.log('Selected node index:', index);
            
            // 移除树节点的选中状态
            document.querySelectorAll('.tree-node-content.selected').forEach(el => {
                el.classList.remove('selected');
            });
            
            // 移除方块的选中状态
            document.querySelectorAll('.control-block.selected').forEach(el => {
                el.classList.remove('selected');
                el.style.filter = '';
                el.style.zIndex = '';
            });
            
            // 选中树节点
            const treeElement = document.querySelector('[data-index="' + index + '"]');
            if (treeElement) {
                console.log('Found tree element');
                treeElement.classList.add('selected');
                treeElement.scrollIntoView({ behavior: 'smooth', block: 'center' });
            } else {
                console.log('Tree element not found');
            }
            
            // 选中方块并提升层级
            const blockElement = document.querySelector('.control-block[data-index="' + index + '"]');
            if (blockElement) {
                console.log('Found block element');
                blockElement.classList.add('selected');
                blockElement.style.zIndex = 9999; // 确保在最上层
                blockElement.style.filter = 'brightness(1.8)';
                
                // 滚动到可视区域
                blockElement.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'nearest' });
            } else {
                console.log('Block element not found');
            }
            
            selectedNode = treeData[index];
            showDetail(selectedNode);
        }

        function showDetail(node) {
            const panel = document.getElementById('detailPanel');
            panel.classList.add('show');
            
            let html = '<div class="detail-header">' + escapeHtml(node.control_type) + '</div>';
            
            html += '<div class="detail-section">';
            html += '<h3>基本信息</h3>';
            html += createDetailItem('控件类型', node.control_type);
            html += createDetailItem('名称', node.name || '(无名称)');
            html += createDetailItem('Automation ID', node.automation_id || '(无)');
            html += createDetailItem('类名', node.class_name || '(无)');
            html += '</div>';
            
            if (node.position) {
                html += '<div class="detail-section">';
                html += '<h3>位置信息</h3>';
                html += createDetailItem('X 坐标', node.position.x);
                html += createDetailItem('Y 坐标', node.position.y);
                html += createDetailItem('宽度', node.position.width);
                html += createDetailItem('高度', node.position.height);
                html += '</div>';
            }
            
            if (node.value !== undefined && node.value !== '') {
                html += '<div class="detail-section">';
                html += '<h3>值</h3>';
                html += createDetailItem('Value', escapeHtml(node.value));
                html += '</div>';
            }
            
            html += '<div class="detail-section">';
            html += '<h3>层级</h3>';
            html += createDetailItem('深度', '第 ' + node.depth + ' 层');
            html += '</div>';
            
            panel.innerHTML = html;
        }

        function createDetailItem(label, value) {
            return '<div class="detail-item">' +
                   '<div class="detail-label">' + label + '</div>' +
                   '<div class="detail-value">' + value + '</div>' +
                   '</div>';
        }

        function toggleNode(event, element) {
            event.stopPropagation();
            const children = element.parentElement.nextElementSibling;
            if (children && children.classList.contains('tree-node-children')) {
                const isHidden = children.style.display === 'none';
                children.style.display = isHidden ? 'block' : 'none';
                element.textContent = isHidden ? '▼' : '▶';
            }
        }

        function searchTree() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const nodes = document.querySelectorAll('.tree-node-content');
            
            nodes.forEach(node => {
                const text = node.textContent.toLowerCase();
                if (searchTerm && text.includes(searchTerm)) {
                    node.style.background = '#613214';
                    expandParents(node);
                } else {
                    node.style.background = '';
                }
            });
        }

        function expandParents(element) {
            let parent = element.parentElement;
            while (parent) {
                if (parent.classList.contains('tree-node-children')) {
                    parent.style.display = 'block';
                    const toggle = parent.previousElementSibling?.querySelector('.tree-toggle');
                    if (toggle) toggle.textContent = '▼';
                }
                parent = parent.parentElement;
            }
        }

        function updateStats() {
            if (!jsonData) return;
            
            document.getElementById('totalControls').textContent = jsonData.control_tree?.length || 0;
            document.getElementById('buttonCount').textContent = jsonData.special_controls?.buttons?.length || 0;
            document.getElementById('listCount').textContent = jsonData.special_controls?.lists?.length || 0;
            document.getElementById('chatCount').textContent = jsonData.chat_list?.length || 0;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
